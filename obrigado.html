<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Confirmação de envio de contato da Bmaxbrasil." />
  <title>Mensagem enviada | Bmaxbrasil</title>
  <link rel="icon" type="image/png" href="./assets/images/favicon/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --text: #11161b;
      --muted: #5f6d78;
      --line: rgba(22, 34, 46, 0.12);
      --accent-strong: #506577;
      --radius: 8px;
      --shadow: 0 22px 50px rgba(24, 36, 48, 0.08);
      --font-display: "Montserrat", Arial, sans-serif;
      --font-body: "Roboto", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(127, 151, 170, 0.08), rgba(255, 255, 255, 0.94)),
        #ffffff;
      color: var(--text);
      font-family: var(--font-body);
    }

    .thanks-card {
      width: min(100%, 720px);
      padding: clamp(28px, 5vw, 46px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent-strong);
      font-family: var(--font-display);
      font-size: 0.74rem;
      font-weight: 700;
      background: #f8fafc;
    }

    h1 {
      margin: 18px 0 16px;
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 700;
      font-family: var(--font-display);
    }

    .btn-primary {
      background: #11161b;
      color: #ffffff;
      border-color: #11161b;
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="thanks-card">
    <span class="eyebrow">Contato enviado</span>
    <h1>Mensagem enviada com sucesso.</h1>
    <p>
      Recebemos o seu contato e nossa equipe retornará em breve. Obrigado por falar com a Bmaxbrasil.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="./index.html#contato">Voltar ao site</a>
      <a class="btn btn-secondary" href="https://wa.me/5545998437229?text=Ol%C3%A1%2C%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es%20sobre%20a%20Gordura%20Su%C3%ADna%20Padronizada.">Falar no WhatsApp</a>
    </div>
  </main>
</body>
</html>
